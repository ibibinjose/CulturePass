# Google Checks — mobile privacy / compliance scan of an APK, AAB, or IPA.
#
# Repo secrets (Settings → Secrets → Actions):
#   CHECKS_ACCOUNT_ID           — https://checks.google.com/console/settings/account
#   CHECKS_APP_ID               — https://checks.google.com/console/settings/apps
#   CHECKS_SERVICE_ACCOUNT_BASE64 — base64 of service account JSON key
#
# This does NOT run on push: the Checks action requires a real binary on disk.
# Typical flow: EAS Build → copy the artifact download URL → Run workflow manually.
#
# Docs: https://github.com/google-checks/checks-app-scan-github-action
name: Checks App Compliance Scan

on:
  workflow_dispatch:
    inputs:
      binary_url:
        description: 'Direct HTTPS URL to .apk, .aab, or .ipa (e.g. EAS build download link)'
        required: true
        type: string
      binary_filename:
        description: 'Filename only (e.g. app-release.apk). Leave empty to use culturepass-scan.apk — no paths or .. segments.'
        required: false
        default: 'culturepass-scan.apk'
        type: string
      wait_for_report:
        description: 'Wait for Checks report in the job log'
        required: false
        default: true
        type: boolean

jobs:
  compliance-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Google Checks secrets
        env:
          CHECKS_ACCOUNT_ID: ${{ secrets.CHECKS_ACCOUNT_ID }}
          CHECKS_APP_ID: ${{ secrets.CHECKS_APP_ID }}
          CHECKS_SA: ${{ secrets.CHECKS_SERVICE_ACCOUNT_BASE64 }}
        run: |
          if [ -z "$CHECKS_ACCOUNT_ID" ] || [ -z "$CHECKS_APP_ID" ] || [ -z "$CHECKS_SA" ]; then
            echo "::error::Configure repo secrets CHECKS_ACCOUNT_ID, CHECKS_APP_ID, and CHECKS_SERVICE_ACCOUNT_BASE64. See comments at the top of this workflow file."
            exit 1
          fi

      - name: Validate binary filename
        id: binary
        env:
          RAW_INPUT: ${{ inputs.binary_filename }}
        run: |
          set -euo pipefail
          # Optional input: empty/whitespace → documented default (required:false + default only pre-fills UI; empty submit still happens)
          RAW="${RAW_INPUT:-}"
          RAW="${RAW#"${RAW%%[![:space:]]*}"}"
          RAW="${RAW%"${RAW##*[![:space:]]}"}"
          if [ -z "$RAW" ]; then
            RAW='culturepass-scan.apk'
          fi
          BASE="$(basename -- "$RAW")"
          if [ "$BASE" != "$RAW" ]; then
            echo "::error::binary_filename must be a single filename with no slashes (got: ${RAW_INPUT})"
            exit 1
          fi
          case "$BASE" in
            *..*|*[\\/]*)
              echo "::error::binary_filename must not contain .. or path separators"
              exit 1
              ;;
          esac
          ext="${BASE##*.}"
          ext_lc=$(printf '%s' "$ext" | tr '[:upper:]' '[:lower:]')
          if [ "$ext_lc" != apk ] && [ "$ext_lc" != aab ] && [ "$ext_lc" != ipa ]; then
            echo "::error::binary_filename must end with .apk, .aab, or .ipa"
            exit 1
          fi
          stem="${BASE%.*}"
          if [ -z "$stem" ] || [[ ! "$stem" =~ ^[a-zA-Z0-9]([a-zA-Z0-9._-]*[a-zA-Z0-9])?$ ]]; then
            echo "::error::binary_filename must use only letters, digits, ., _, - (no leading/trailing dots)"
            exit 1
          fi
          echo "safe_name=$BASE" >> "$GITHUB_OUTPUT"
          echo "Using artifact filename: $BASE"

      - name: Download app binary
        env:
          BINARY_URL: ${{ inputs.binary_url }}
          SAFE_NAME: ${{ steps.binary.outputs.safe_name }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          out="artifacts/${SAFE_NAME}"
          echo "Downloading to $out"
          curl -fSL "$BINARY_URL" -o "$out"
          test -s "$out"
          ls -la "$out"

      - name: Checks App Compliance Scan
        uses: google-checks/checks-app-scan-github-action@v1.0.3
        with:
          account_id: ${{ secrets.CHECKS_ACCOUNT_ID }}
          app_id: ${{ secrets.CHECKS_APP_ID }}
          service_account_base64: ${{ secrets.CHECKS_SERVICE_ACCOUNT_BASE64 }}
          binary_path: ./artifacts/${{ steps.binary.outputs.safe_name }}
          wait_for_report: ${{ inputs.wait_for_report }}
