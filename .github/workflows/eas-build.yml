name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
          - development

  push:
    branches: [main]
    # You can add tags or paths filters here if desired

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0


      - name: Setup Node
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: 22
          cache: 'npm'


      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}


      - name: Build with EAS
        id: eas-build
        env:
          INPUT_PROFILE: ${{ github.event.inputs.profile }}
        run: |
          PROFILE="${INPUT_PROFILE:-production}"
          # Run build and capture JSON output for reliable build metadata
          BUILD_JSON=$(eas build --platform all --profile "$PROFILE" --non-interactive --wait --json 2>/dev/null || echo '[]')
          echo "build_json<<EOF" >> $GITHUB_ENV
          echo "$BUILD_JSON" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          # Extract first build ID (they share the same submission/build number across platforms usually)
          FIRST_BUILD_ID=$(echo "$BUILD_JSON" | jq -r '.[0].id // empty')
          echo "EAS_FIRST_BUILD_ID=$FIRST_BUILD_ID" >> $GITHUB_ENV
          echo "Captured EAS build ID: $FIRST_BUILD_ID"