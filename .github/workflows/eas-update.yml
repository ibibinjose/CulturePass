name: EAS Update (OTA)

on:
  push:
    branches:
      - preview    # OTA to preview channel
      - main       # OTA to production channel

jobs:
  update:
    name: EAS Update → ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        run: |
          eas update --branch ${{ github.ref_name }} --message "${{ github.event.head_commit.message }}" --non-interactive
