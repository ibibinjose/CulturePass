<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CulturePass Dev Preview</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        .container { display: flex; flex-direction: column; height: 100%; align-items: center; justify-content: center; background: #000; color: #fff; }
        iframe { width: 100%; height: 100%; border: none; }
        .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1; }
    </style>
</head>
<body>
    <div class="loading">Loading http://localhost:8081/...</div>
    <iframe src="http://localhost:8081/" allow="geolocation; microphone; camera; midi; vr; accelerometer; gyroscope; payment; ambient-light-sensor; encrypted-media; usb"></iframe>
    <script>
        const serverUrl = 'http://localhost:8081/';
        const showServerNotFound = () => {
            document.body.innerHTML = `
                <div class="container">
                    <h1>Server Not Found</h1>
                    <p>It looks like the Expo server at <b>${serverUrl}</b> is not running.</p>
                    <p>Please start it using <code>npx expo start --web</code></p>
                </div>
            `;
        };

        const iframe = document.querySelector('iframe');
        if (iframe) {
            iframe.addEventListener('error', showServerNotFound);
            iframe.addEventListener('load', () => {
                // If the page loads but fetch failed, the server is still likely unavailable.
                if (!window.__serverDetected) {
                    showServerNotFound();
                }
            });
        }

        fetch(serverUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Server responded with ${response.status}`);
                }
                window.__serverDetected = true;
            })
            .catch(() => {
                showServerNotFound();
            });
    </script>
</body>
</html>
