# SonarQube Configuration for CulturePass
sonar.projectKey=culturepass-app
sonar.organization=culturepass
sonar.projectName=CulturePass Application
sonar.projectVersion=1.2.1

# Source directories
sonar.sources=src,functions/src
sonar.tests=scripts/tests

# Language-specific configurations
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude generated and dependency files
sonar.exclusions=**/node_modules/**,**/lib/**,**/.next/**,**/dist/**,**/build/**,functions/lib/**,*.test.*,*.spec.*,**/coverage/**,**/__tests__/**

# Test files
sonar.test.inclusions=**/*.test.*,**/*.spec.*,**/tests/**

# Coverage
sonar.coverage.exclusions=**/node_modules/**,**/lib/**,**/.next/**,**/dist/**,**/build/**,functions/lib/**

# Encoding
sonar.sourceEncoding=UTF-8